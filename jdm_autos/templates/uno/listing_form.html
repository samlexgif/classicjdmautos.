{% extends 'uno/base.html' %}
{% block content %}
<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form.as_p }}

  <h4>Gallery Images</h4>
  {{ formset.management_form }}
  {% for subform in formset %}
    {{ subform.as_p }}
  {% endfor %}

  <button type="submit" class="btn btn-primary">Save Listing</button>
</form>
{% endblock %}
